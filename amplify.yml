version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22 && nvm use 22
        - node -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env | grep -e PUBLIC_ >> .env || true
        - npm run build
        - npm run verify:seo
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
