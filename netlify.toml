[build]
  publish = "dist"
  command = "npm run build"
[build.processing.html]
  pretty_urls = false
[[redirects]]
  from = "/free-ai-audit"
  to = "/automation-roadmap"
  status = 301
  force = true

[[redirects]]
  from = "/es/auditoria-ia-gratuita"
  to = "/es/hoja-de-ruta-de-automatizacion"
  status = 301
  force = true

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/rss.xml"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=300, must-revalidate"

[[headers]]
  for = "/es/rss.xml"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=300, must-revalidate"
