site:
  name: Futurion Solutions
  site: 'https://solutions.futurion.es'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Futurion Solutions
    template: '%s — Futurion Solutions'
  description: 'Private AI tools that keep sensitive data inside your own boundary — on your hardware or cloud account. Mapped to GDPR, the EU AI Act, ISO 27001 and SOC 2.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Futurion Solutions
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr
  defaultLocale: en
  locales:
    - en
    - es

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: false
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: "G-EQ1JB7WMNZ"

ui:
  theme: 'system'
